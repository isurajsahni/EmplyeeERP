<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        outline: "#737686",
                        "surface-container": "#ededf9",
                        "surface-tint": "#0053db",
                        "on-primary": "#ffffff",
                        primary: "#004ac6",
                        "on-surface": "#191b23",
                        "surface-variant": "#e1e2ed",
                        "outline-variant": "#c3c6d7",
                        "surface-container-low": "#f3f3fe",
                        "surface-container-lowest": "#ffffff"
                    }
                }
            }
        };
    </script>
    <style> .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; } body { background-color: #F8FAFC; } </style>
</head>
<body class="text-on-surface flex h-screen overflow-hidden">
    <main class="md:ml-64 flex-1 flex flex-col">
        <header class="flex justify-between items-center w-full px-6 h-16 bg-white border-b border-outline-variant shrink-0">
            <h1 class="font-bold text-2xl text-primary">Team Chat</h1>
            <div class="flex gap-2">
                <button class="bg-surface-container-low p-2 rounded-full"><span class="material-symbols-outlined">videocam</span></button>
            </div>
        </header>
        <div class="flex-1 flex overflow-hidden">
            <!-- Channels Sidebar -->
            <div class="w-64 border-r border-outline-variant bg-surface-container-low p-4 flex flex-col gap-4 overflow-y-auto">
                <div>
                    <h3 class="text-xs font-bold text-gray-500 uppercase mb-2">Channels</h3>
                    <div class="space-y-1">
                        <button class="w-full text-left px-3 py-1.5 rounded-lg bg-surface-variant font-semibold"># general</button>
                        <button class="w-full text-left px-3 py-1.5 rounded-lg hover:bg-surface-variant text-gray-700"># engineering</button>
                        <button class="w-full text-left px-3 py-1.5 rounded-lg hover:bg-surface-variant text-gray-700"># announcements</button>
                    </div>
                </div>
                <div>
                    <h3 class="text-xs font-bold text-gray-500 uppercase mb-2 flex justify-between items-center">
                        Direct Messages
                        <span class="material-symbols-outlined text-sm cursor-pointer">add</span>
                    </h3>
                    <div class="space-y-1">
                        <button class="w-full text-left px-3 py-1.5 rounded-lg hover:bg-surface-variant text-gray-700 flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full bg-green-500"></div>
                            Sarah Jenkins
                        </button>
                        <button class="w-full text-left px-3 py-1.5 rounded-lg hover:bg-surface-variant text-gray-700 flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full bg-gray-400"></div>
                            Mike Ross
                        </button>
                    </div>
                </div>
            </div>
            <!-- Chat Area -->
            <div class="flex-1 flex flex-col bg-white">
                <!-- Messages -->
                <div class="flex-1 p-6 overflow-y-auto space-y-6">
                    <div class="flex gap-4">
                        <div class="w-10 h-10 rounded-full bg-primary text-white flex items-center justify-center font-bold">SJ</div>
                        <div>
                            <div class="flex items-baseline gap-2">
                                <span class="font-bold">Sarah Jenkins</span>
                                <span class="text-xs text-gray-500">10:42 AM</span>
                            </div>
                            <p class="text-gray-800">Has anyone checked the new ERP designs? They look amazing.</p>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <div class="w-10 h-10 rounded-full bg-gray-300 text-gray-700 flex items-center justify-center font-bold">MR</div>
                        <div>
                            <div class="flex items-baseline gap-2">
                                <span class="font-bold">Mike Ross</span>
                                <span class="text-xs text-gray-500">10:45 AM</span>
                            </div>
                            <p class="text-gray-800">Yes! Just reviewing the documentation now. Will integrate the components later today.</p>
                        </div>
                    </div>
                </div>
                <!-- Input Area -->
                <div class="p-4 bg-white border-t border-outline-variant">
                    <div class="border border-outline-variant rounded-lg p-2 focus-within:ring-2 focus-within:ring-primary flex items-center bg-surface-container-low">
                        <button class="p-2 text-gray-500 hover:text-gray-800"><span class="material-symbols-outlined">add_circle</span></button>
                        <input type="text" placeholder="Message #general..." class="flex-1 bg-transparent border-none outline-none p-2"/>
                        <button class="p-2 text-primary hover:text-primary-800"><span class="material-symbols-outlined">send</span></button>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
